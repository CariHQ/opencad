<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#0a0a0a"/>

  <!-- Floor plan corner — top-down view of two walls meeting -->

  <!-- Outer wall face: white filled L-shape via two overlapping rects -->
  <!-- Vertical wall segment -->
  <rect x="76" y="76" width="64" height="360" fill="white"/>
  <!-- Horizontal wall segment -->
  <rect x="76" y="76" width="360" height="64" fill="white"/>

  <!-- Inner wall face: blue L-shape (wall thickness marker) -->
  <rect x="152" y="152" width="18" height="252" fill="#0052ff"/>
  <rect x="152" y="152" width="252" height="18" fill="#0052ff"/>

  <!-- Junction dot at inner corner -->
  <circle cx="161" cy="161" r="20" fill="#0052ff"/>
</svg>
