<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200, height=630" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #0a0a0a;
      font-family: 'Inter', -apple-system, sans-serif;
      color: white;
      position: relative;
    }

    /* Subtle grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Gradient overlay */
    .gradient-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,82,255,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, var(--accent-glow, rgba(0,82,255,0.10)) 0%, transparent 50%);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      padding: 56px 72px;
    }

    /* Logo */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: white;
    }
    .role-badge {
      margin-left: 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent, #0052ff);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 4px 12px;
      border-radius: 100px;
    }

    /* Main headline */
    .headline-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px 0;
    }
    .pre-label {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent, #0052ff);
      margin-bottom: 20px;
    }
    h1 {
      font-size: 62px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
      color: white;
      max-width: 820px;
    }
    h1 em {
      color: var(--accent, #0052ff);
      font-style: normal;
    }
    .sub {
      margin-top: 24px;
      font-size: 22px;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      max-width: 700px;
      line-height: 1.5;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .url {
      font-size: 16px;
      color: rgba(255,255,255,0.3);
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .cta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent, #0052ff);
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 100px;
    }

    /* Decorative corner shape */
    .deco {
      position: absolute;
      right: 0;
      top: 0;
      width: 400px;
      height: 630px;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="gradient-overlay" id="gradient"></div>

  <!-- Decorative abstract shape -->
  <svg class="deco" viewBox="0 0 400 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g opacity="0.25">
      <!-- Blueprint-style lines -->
      <line x1="80" y1="0" x2="80" y2="630" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="160" y1="0" x2="160" y2="630" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="240" y1="0" x2="240" y2="630" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="320" y1="0" x2="320" y2="630" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="0" y1="105" x2="400" y2="105" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="0" y1="210" x2="400" y2="210" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="0" y1="315" x2="400" y2="315" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="0" y1="420" x2="400" y2="420" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
      <line x1="0" y1="525" x2="400" y2="525" stroke="white" stroke-width="0.5" stroke-dasharray="4 8"/>
    </g>
    <!-- Accent cross marks at grid intersections -->
    <g id="accent-marks" opacity="0.6">
      <!-- will be colored by JS -->
    </g>
    <!-- Building outline silhouette -->
    <path d="M200 480 L200 240 L280 200 L360 240 L360 480 Z" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
    <path d="M80 480 L80 300 L160 260 L240 300 L240 480 Z" fill="none" stroke="white" stroke-width="1" opacity="0.06"/>
    <!-- Windows -->
    <rect x="220" y="280" width="20" height="24" rx="2" fill="white" opacity="0.06"/>
    <rect x="254" y="280" width="20" height="24" rx="2" fill="white" opacity="0.06"/>
    <rect x="288" y="280" width="20" height="24" rx="2" fill="white" opacity="0.06"/>
    <rect x="220" y="320" width="20" height="24" rx="2" fill="white" opacity="0.06"/>
    <rect x="254" y="320" width="20" height="24" rx="2" fill="white" opacity="0.06"/>
    <rect x="288" y="320" width="20" height="24" rx="2" fill="white" opacity="0.06"/>
  </svg>

  <div class="content">
    <div class="logo-row">
      <!-- Logo icon matching favicon -->
      <svg class="logo-icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="44" height="44" rx="10" fill="#0a0a0a"/>
        <rect x="7" y="7" width="14" height="30" fill="white"/>
        <rect x="7" y="7" width="30" height="14" fill="white"/>
        <rect x="14" y="14" width="4" height="18" fill="#0052ff"/>
        <rect x="14" y="14" width="18" height="4" fill="#0052ff"/>
        <circle cx="15" cy="15" r="4" fill="#0052ff"/>
      </svg>
      <span class="logo-text">OpenCAD</span>
      <span class="role-badge" id="role-badge" style="display:none"></span>
    </div>

    <div class="headline-block">
      <p class="pre-label" id="pre-label" style="display:none"></p>
      <h1 id="headline">Browser-Native BIM Platform</h1>
      <p class="sub" id="sub">AI-powered design, real-time collaboration, IFC4 export. No install required.</p>
    </div>

    <div class="bottom-row">
      <span class="url">opencad.archi</span>
      <span class="cta-pill" id="cta-pill">
        Start free 14-day trial
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M8 3l5 5-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
    </div>
  </div>

  <script>
    // Parse URL params to customize the card
    const params = new URLSearchParams(location.search);
    const accent = params.get('accent') || '#0052ff';
    const accentGlow = params.get('accentGlow') || 'rgba(0,82,255,0.10)';
    const headline = params.get('headline');
    const sub = params.get('sub');
    const preLabel = params.get('preLabel');
    const roleBadge = params.get('role');
    const ctaText = params.get('cta');

    // Apply accent color
    document.documentElement.style.setProperty('--accent', accent);
    document.documentElement.style.setProperty('--accent-glow', accentGlow);

    // Add accent marks to deco SVG
    const marks = document.getElementById('accent-marks');
    [[80,105],[160,210],[240,315],[320,420],[80,420],[160,105],[240,525]].forEach(([x,y]) => {
      marks.innerHTML += `<circle cx="${x}" cy="${y}" r="3" fill="${accent}" opacity="0.7"/>`;
      marks.innerHTML += `<line x1="${x-8}" y1="${y}" x2="${x+8}" y2="${y}" stroke="${accent}" stroke-width="1.5" opacity="0.7"/>`;
      marks.innerHTML += `<line x1="${x}" y1="${y-8}" x2="${x}" y2="${y+8}" stroke="${accent}" stroke-width="1.5" opacity="0.7"/>`;
    });

    // Update gradient overlay
    document.getElementById('gradient').style.background =
      `radial-gradient(ellipse at 20% 50%, ${accentGlow} 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, ${accentGlow} 0%, transparent 50%)`;

    if (headline) document.getElementById('headline').innerHTML = headline;
    if (sub) document.getElementById('sub').textContent = sub;

    if (preLabel) {
      const el = document.getElementById('pre-label');
      el.textContent = preLabel;
      el.style.display = 'block';
    }

    if (roleBadge) {
      const el = document.getElementById('role-badge');
      el.textContent = roleBadge;
      el.style.display = 'inline-flex';
      el.style.borderColor = accent + '44';
    }

    if (ctaText) {
      document.getElementById('cta-pill').childNodes[0].textContent = ctaText + ' ';
    }
  </script>
</body>
</html>
