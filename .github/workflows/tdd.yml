name: TDD Test Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tdd-compliance:
    name: TDD Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for test file changes
        id: test-changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            tests:
              - 'packages/**/*.test.ts'
              - 'packages/**/*.integration.test.ts'
              - 'e2e/**/*.spec.ts'

      - name: Verify tests exist for modified source
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking TDD compliance..."
          # This ensures every src file has a corresponding test
          pnpm turbo run typecheck

      - name: Type check (every commit)
        run: pnpm typecheck

      - name: Lint check (every commit)
        run: pnpm lint

  unit-tests:
    name: Unit Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - '@opencad/shared'
          - '@opencad/document'
          - '@opencad/geometry'
          - '@opencad/sync'
          - '@opencad/ai'
          - '@opencad/app'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies (required for @opencad/app)
        if: matrix.package == '@opencad/app'
        run: pnpm exec turbo run build --filter=@opencad/document

      - name: Run unit tests
        run: pnpm --filter=${{ matrix.package }} test:unit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.package }}
          path: |
            packages/**/coverage
            packages/**/test-results

  geometry-tests:
    name: Geometry Kernel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run geometry tests
        run: pnpm --filter=@opencad/geometry test:unit

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: geometry-coverage
          path: packages/geometry/coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (excluding desktop)
        run: pnpm exec turbo run build --filter='!@opencad/desktop'

      - name: Run integration tests
        run: pnpm test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build:browser

  test-summary:
    name: Test Summary
    needs: [unit-tests, geometry-tests, integration-tests, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate test report
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for dir in artifacts/test-results-*; do
            if [ -d "$dir" ]; then
              name=$(basename "$dir" | sed 's/test-results-//')
              echo "| $name | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports available in artifacts." >> $GITHUB_STEP_SUMMARY
