name: Release

on:
  push:
    branches:
      - main
  release:
    types: [published]   # fires when semantic-release publishes a GitHub Release
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g., v1.0.2)"
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ──────────────────────────────────────────────────────────────
  # 0. Semantic Release (runs on push to main, cuts version + changelog)
  # ──────────────────────────────────────────────────────────────
  semantic-release:
    name: Semantic Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'   # disable pre-commit hook — wasm-pack not available on this runner
        run: pnpm exec semantic-release

  # ──────────────────────────────────────────────────────────────
  # 1. Validate Release
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Release
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Verify tag follows semver
        run: |
          TAG=${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
          if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-z]+(\.[0-9]+)?)?$ ]]; then
            echo "Error: Tag $TAG does not follow semver (expected vX.Y.Z)"
            exit 1
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"

  # ──────────────────────────────────────────────────────────────
  # 2. Build Desktop Apps
  # ──────────────────────────────────────────────────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    needs: validate
    permissions:
      contents: write
    strategy:
      fail-fast: false   # don't cancel macOS/Linux if Windows fails
      matrix:
        include:
          # macOS universal binary (arm64 + x86_64 in one .dmg)
          - platform: macos-latest
            args: --target universal-apple-darwin

          # Windows x64 — NSIS avoids WiX MAX_PATH / large-payload issues
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles nsis

          # Linux x64
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # Both targets required for universal-apple-darwin
      - name: Setup Rust stable + macOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin,wasm32-unknown-unknown

      # Belt-and-suspenders: ensure both arches are present on the runner
      - name: Add macOS cross-compile targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # wasm32 target required by @opencad/geometry (cargo build) on all platforms
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      # beforeBuildCommand runs pnpm build:browser which includes:
      #   @opencad/sync-rs  → needs wasm-pack
      #   @opencad/geometry → needs wasm-bindgen CLI (cargo build + wasm-bindgen)
      - name: Install wasm tooling
        # wasm-bindgen-cli version MUST match wasm-bindgen in packages/geometry/Cargo.toml (=0.2.93)
        run: cargo install wasm-pack --locked && cargo install wasm-bindgen-cli --version 0.2.93 --locked

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (uncomment when Apple Developer certs are set up)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.event.release.tag_name || inputs.tag }}
          releaseName: OpenCAD ${{ github.event.release.tag_name || inputs.tag }}
          releaseBody: ""
          releaseDraft: false
          prerelease: ${{ github.event.release.prerelease || false }}
          args: ${{ matrix.args }}

  # Note: tauri-action@v0.6 creates the GitHub Release and uploads all
  # platform artifacts automatically — no separate release job needed.

  # ──────────────────────────────────────────────────────────────
  # 3. Publish to Package Registries
  # ──────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch') && !github.event.release.prerelease
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        # All packages are currently private — this is a no-op until packages
        # are made public. pnpm publish -r skips private packages automatically.
        run: pnpm publish -r --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # 5. Build & Push Docker Image
  # ──────────────────────────────────────────────────────────────
  docker:
    name: Docker Image
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 60   # arm64 QEMU cross-compile of Rust WASM takes ~45 min
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/carihq/opencad-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ──────────────────────────────────────────────────────────────
  # 6. Notify Community
  # ──────────────────────────────────────────────────────────────
  notify:
    name: Notify Community
    needs: [build-desktop, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Notify Discord
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: Success
          title: "OpenCAD ${{ github.event.release.tag_name || inputs.tag }} Released!"
          description: |
            A new version of OpenCAD is now available.

            **Download:** [GitHub Releases](https://github.com/CariHQ/opencad/releases/tag/${{ github.event.release.tag_name || inputs.tag }})
            **Changelog:** See release notes

            Thank you to all contributors!
          color: 0x00ff00
