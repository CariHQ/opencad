name: Nightly

on:
  schedule:
    # Run at 2am UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Full E2E Suite
  # ──────────────────────────────────────────────────────────────
  test-e2e-full:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build browser app
        run: pnpm build:browser

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Run full E2E suite
        run: pnpm test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 90

  # ──────────────────────────────────────────────────────────────
  # 2. Full Unit Test Suite
  # ──────────────────────────────────────────────────────────────
  test-unit-full:
    name: Full Unit Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run all unit tests
        run: pnpm test:unit

  # ──────────────────────────────────────────────────────────────
  # 3. Cross-Platform Desktop Build
  # ──────────────────────────────────────────────────────────────
  desktop-cross-platform:
    name: Desktop Cross-Platform Build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (debug)
        run: pnpm --filter @opencad/desktop tauri build --debug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}-nightly
          path: packages/desktop/src-tauri/target/debug/bundle/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # 4. Report Summary
  # ──────────────────────────────────────────────────────────────
  report:
    name: Nightly Report
    needs: [test-e2e-full, test-unit-full, desktop-cross-platform]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check job results
        run: |
          echo "=== Nightly Build Summary ==="
          echo "E2E Tests: ${{ needs.test-e2e-full.result }}"
          echo "Unit Tests: ${{ needs.test-unit-full.result }}"
          echo "Desktop Builds: ${{ needs.desktop-cross-platform.result }}"

          if [[ "${{ needs.test-e2e-full.result }}" == "failure" || "${{ needs.test-unit-full.result }}" == "failure" ]]; then
            echo "::error::Nightly build has failures. Check the Actions tab for details."
            exit 1
          fi

      - name: Notify Discord (on failure)
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Nightly Build Failed"
          description: |
            One or more nightly jobs failed. Check the [Actions tab](https://github.com/CariHQ/opencad/actions) for details.
          color: 0xff0000
