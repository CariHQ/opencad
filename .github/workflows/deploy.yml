name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  # ── 1. Run CI ────────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:local

  # ── 2. Build & deploy server to Cloud Run ────────────────────────────────────
  deploy-server:
    name: Deploy Server (Cloud Run)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push Docker image
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="gcr.io/$GCP_PROJECT/opencad-server:$IMAGE_TAG"
          docker build --platform linux/amd64 -f server/Dockerfile -t "$IMAGE" server/
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'europe-west1' }}
        run: |
          gcloud run deploy opencad-server \
            --project="$GCP_PROJECT" \
            --region="$CLOUD_RUN_REGION" \
            --image="$IMAGE" \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},AUTH_ENABLED=true,JWT_SECRET=${{ secrets.JWT_SECRET }},STORAGE_BACKEND=gcs,GCS_BUCKET=${{ vars.GCS_BUCKET }},CORS_ORIGINS=https://opencad.archi" \
            --quiet

  # ── 3. Build frontend & deploy to Firebase Hosting ───────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: pnpm --filter=@opencad/app build

      - name: Copy landing pages into dist
        run: |
          # Role-specific landing pages → /for/<role>/
          cp -r packages/landing/for packages/app/dist/for
          # Legal pages
          cp packages/landing/privacy.html packages/app/dist/privacy.html
          cp packages/landing/terms.html packages/app/dist/terms.html
          # Marketing root — served as the homepage (replaces the SPA catch-all at /)
          cp packages/landing/index.html packages/app/dist/landing.html
          # OG social images
          cp packages/landing/og*.png packages/app/dist/ 2>/dev/null || true

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OPENCAD_PROD }}
          channelId: live
          projectId: opencad-prod
