name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: opencad-prod
  REGION: us-central1
  SERVICE: opencad-server
  REGISTRY: us-central1-docker.pkg.dev
  # WIF bootstrap values — these are identifiers, not credentials
  WIF_PROVIDER: projects/964811410052/locations/global/workloadIdentityPools/github-actions/providers/github
  SERVICE_ACCOUNT: opencad-ci@opencad-prod.iam.gserviceaccount.com

jobs:
  # ── Build, push, and deploy the Rust server ────────────────────────────
  build-server:
    name: Build & deploy server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Load config from Secret Manager
        id: secrets
        run: |
          sm() { gcloud secrets versions access latest --secret="$1" --project=${{ env.PROJECT_ID }}; }
          echo "GCS_BUCKET=$(sm opencad-gcs-bucket)"         >> "$GITHUB_ENV"
          echo "FIREBASE_PROJECT_ID=$(sm opencad-firebase-project-id)" >> "$GITHUB_ENV"
          echo "CORS_ORIGINS=$(sm opencad-cors-origins)"     >> "$GITHUB_ENV"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push server image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/opencad/${{ env.SERVICE }}:${{ github.sha }}"
          docker build --file Dockerfile --tag "$IMAGE" \
            --tag "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/opencad/${{ env.SERVICE }}:latest" .
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/opencad/${{ env.SERVICE }}:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "AUTH_ENABLED=true" \
            --set-env-vars "STORAGE_BACKEND=gcs" \
            --set-env-vars "GCS_BUCKET=${{ env.GCS_BUCKET }}" \
            --set-env-vars "FIREBASE_PROJECT_ID=${{ env.FIREBASE_PROJECT_ID }}" \
            --set-env-vars "CORS_ORIGINS=${{ env.CORS_ORIGINS }}" \
            --set-secrets "DATABASE_URL=opencad-database-url:latest" \
            --set-secrets "JWT_SECRET=opencad-jwt-secret:latest" \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:opencad-db \
            --min-instances 0 \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60

  # ── Deploy the landing page ─────────────────────────────────────────────
  deploy-landing:
    name: Deploy landing page
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Load Firebase config from Secret Manager
        run: |
          sm() { gcloud secrets versions access latest --secret="$1" --project=${{ env.PROJECT_ID }}; }
          echo "FB_API_KEY=$(sm opencad-firebase-api-key)"               >> "$GITHUB_ENV"
          echo "FB_AUTH_DOMAIN=$(sm opencad-firebase-auth-domain)"       >> "$GITHUB_ENV"
          echo "FB_PROJECT_ID=$(sm opencad-firebase-project-id)"         >> "$GITHUB_ENV"
          echo "FB_STORAGE_BUCKET=$(sm opencad-firebase-storage-bucket)" >> "$GITHUB_ENV"
          echo "FB_SENDER_ID=$(sm opencad-firebase-messaging-sender-id)" >> "$GITHUB_ENV"
          echo "FB_APP_ID=$(sm opencad-firebase-app-id)"                 >> "$GITHUB_ENV"
          echo "LANDING_BUCKET=$(sm opencad-landing-bucket)"             >> "$GITHUB_ENV"

      - name: Inject Firebase config into landing page
        run: |
          sed -i \
            -e "s|REPLACE_WITH_YOUR_API_KEY|${{ env.FB_API_KEY }}|g" \
            -e "s|REPLACE_WITH_PROJECT.firebaseapp.com|${{ env.FB_AUTH_DOMAIN }}|g" \
            -e "s|REPLACE_WITH_PROJECT_ID|${{ env.FB_PROJECT_ID }}|g" \
            -e "s|REPLACE_WITH_PROJECT.appspot.com|${{ env.FB_STORAGE_BUCKET }}|g" \
            -e "s|REPLACE_WITH_SENDER_ID|${{ env.FB_SENDER_ID }}|g" \
            -e "s|REPLACE_WITH_APP_ID|${{ env.FB_APP_ID }}|g" \
            packages/landing/index.html

      - name: Upload to GCS
        run: |
          gsutil cp packages/landing/index.html gs://${{ env.LANDING_BUCKET }}/index.html
          gsutil setmeta -h "Cache-Control:no-cache,no-store" \
            gs://${{ env.LANDING_BUCKET }}/index.html
          # Upload app demo screenshots (long-lived; filenames are stable)
          if [ -d packages/landing/screenshots ]; then
            gsutil -m cp packages/landing/screenshots/*.png \
              gs://${{ env.LANDING_BUCKET }}/screenshots/
            gsutil -m setmeta -h "Cache-Control:public,max-age=604800" \
              "gs://${{ env.LANDING_BUCKET }}/screenshots/*.png" || true
          fi

  # ── Build and deploy the React app ─────────────────────────────────────
  deploy-app:
    name: Build & deploy web app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Load config from Secret Manager
        run: |
          sm() { gcloud secrets versions access latest --secret="$1" --project=${{ env.PROJECT_ID }}; }
          echo "VITE_FIREBASE_API_KEY=$(sm opencad-firebase-api-key)"                   >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_AUTH_DOMAIN=$(sm opencad-firebase-auth-domain)"           >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_PROJECT_ID=$(sm opencad-firebase-project-id)"             >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_STORAGE_BUCKET=$(sm opencad-firebase-storage-bucket)"     >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(sm opencad-firebase-messaging-sender-id)" >> "$GITHUB_ENV"
          echo "VITE_FIREBASE_APP_ID=$(sm opencad-firebase-app-id)"                     >> "$GITHUB_ENV"
          echo "APP_BUCKET=$(sm opencad-app-bucket)"                                    >> "$GITHUB_ENV"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build React app
        run: pnpm build:browser
        env:
          VITE_FIREBASE_API_KEY:             ${{ env.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ env.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ env.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ env.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ env.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ env.VITE_FIREBASE_APP_ID }}
          VITE_API_URL:                      https://api.opencad.archi

      - name: Upload to GCS
        run: |
          gsutil -m rsync -r -d packages/app/dist gs://${{ env.APP_BUCKET }}
          gsutil -m setmeta -h "Cache-Control:public,max-age=31536000,immutable" \
            "gs://${{ env.APP_BUCKET }}/assets/**" || true
          gsutil setmeta -h "Cache-Control:no-cache,no-store" \
            gs://${{ env.APP_BUCKET }}/index.html
