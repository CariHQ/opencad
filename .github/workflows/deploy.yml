name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  # ── 1. Run CI ────────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg
      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen
      - run: pnpm install --frozen-lockfile
      - run: pnpm ci:local

  # ── 2. Build & deploy server to Cloud Run ────────────────────────────────────
  deploy-server:
    name: Deploy Server (Cloud Run)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push Docker image
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="gcr.io/$GCP_PROJECT/opencad-server:$IMAGE_TAG"
          docker build --platform linux/amd64 -f server/Dockerfile -t "$IMAGE" server/
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
          CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION || 'europe-west1' }}
        run: |
          gcloud run deploy opencad-server \
            --project="$GCP_PROJECT" \
            --region="$CLOUD_RUN_REGION" \
            --image="$IMAGE" \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --add-cloudsql-instances=opencad-prod:us-central1:opencad-db \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},CLOUD_SQL_INSTANCE=opencad-prod:us-central1:opencad-db,AUTH_ENABLED=true,FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }},JWT_SECRET=${{ secrets.JWT_SECRET }},STORAGE_BACKEND=gcs,GCS_BUCKET=${{ vars.GCS_BUCKET }},CORS_ORIGINS=https://opencad.archi,GITHUB_TOKEN=${{ secrets.OPENCAD_GITHUB_TOKEN }},GITHUB_REPO=CariHQ/opencad" \
            --quiet

  # ── 3. Build app & deploy to GCS ─────────────────────────────────────────────
  # Infrastructure: Cloud LB → opencad-landing bucket (opencad.archi root)
  #                           → opencad-app bucket     (app.opencad.archi)
  deploy-frontend:
    name: Deploy Frontend (GCS)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build workspace dependencies
        run: |
          # Build pure-JS packages only (no WASM — sync-rs and geometry need wasm-pack)
          pnpm --filter=@opencad/shared --filter=@opencad/document --filter=@opencad/ai build

      - name: Build frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: pnpm --filter=@opencad/app build

      - name: Deploy app to GCS (app.opencad.archi)
        run: |
          gsutil -m rsync -r -d packages/app/dist gs://opencad-app

      - name: Deploy landing pages to GCS (opencad.archi)
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          set -euo pipefail
          # Inject the public Firebase web config into every HTML so the
          # landing auth forms can actually create users. (Not a secret —
          # these values are restricted by domain allow-list on Firebase.)
          LANDING_TMP="$(mktemp -d)"
          cp -R packages/landing/. "$LANDING_TMP"
          INJECT="<script>
            window.FIREBASE_API_KEY            = '${VITE_FIREBASE_API_KEY}';
            window.FIREBASE_AUTH_DOMAIN        = '${VITE_FIREBASE_AUTH_DOMAIN}';
            window.FIREBASE_PROJECT_ID         = '${VITE_FIREBASE_PROJECT_ID}';
            window.FIREBASE_STORAGE_BUCKET     = '${VITE_FIREBASE_STORAGE_BUCKET}';
            window.FIREBASE_MESSAGING_SENDER_ID= '${VITE_FIREBASE_MESSAGING_SENDER_ID}';
            window.FIREBASE_APP_ID             = '${VITE_FIREBASE_APP_ID}';
          </script>"
          while IFS= read -r -d '' f; do
            python3 -c "
import sys, pathlib
p = pathlib.Path(sys.argv[1])
p.write_text(p.read_text().replace('<!-- FIREBASE_CONFIG_INJECT -->', sys.argv[2]))
" "$f" "$INJECT"
          done < <(find "$LANDING_TMP" -name '*.html' -print0)

          # Marketing homepage
          gsutil cp "$LANDING_TMP/index.html" gs://opencad-landing/index.html
          # Pricing page
          gsutil cp "$LANDING_TMP/pricing.html" gs://opencad-landing/pricing.html
          # Legal pages
          gsutil cp "$LANDING_TMP/privacy.html" gs://opencad-landing/privacy.html
          gsutil cp "$LANDING_TMP/terms.html" gs://opencad-landing/terms.html
          # Download page
          gsutil cp "$LANDING_TMP/download.html" gs://opencad-landing/download.html
          # Role-specific pages
          gsutil -m rsync -r "$LANDING_TMP/for" gs://opencad-landing/for
          # OG social images
          gsutil -m cp "$LANDING_TMP"/og*.png gs://opencad-landing/ 2>/dev/null || true
          gsutil -m rsync -r "$LANDING_TMP/screenshots" gs://opencad-landing/screenshots
          # Landing HTML is no-cache so deploys reflect instantly.
          gsutil -m setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" \
            "gs://opencad-landing/*.html" 2>/dev/null || true
          gsutil -m setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" \
            "gs://opencad-landing/for/**/*.html" 2>/dev/null || true

      - name: Invalidate CDN cache
        env:
          GCP_PROJECT: ${{ vars.GCP_PROJECT }}
        run: |
          gcloud compute url-maps invalidate-cdn-cache opencad-url-map \
            --path "/*" \
            --project="$GCP_PROJECT" \
            --async \
            --quiet
