name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  RUST_VERSION: stable

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Type Checking
  # ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  # ──────────────────────────────────────────────────────────────
  # 2. Linting
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check
        # Non-blocking until formatting is applied across the whole codebase
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # 3. Rust Checks
  # ──────────────────────────────────────────────────────────────
  rust-check:
    name: Rust Check (Clippy + fmt)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/desktop/src-tauri -> target
            packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (required by tauri::generate_context!)
        run: pnpm build:browser

      - name: Check formatting (Desktop)
        run: cargo fmt --all -- --check
        working-directory: packages/desktop/src-tauri

      - name: Clippy (Desktop)
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: packages/desktop/src-tauri

  # ──────────────────────────────────────────────────────────────
  # 4. Unit Tests
  # ──────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Post coverage comment
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json

  # ──────────────────────────────────────────────────────────────
  # 6. E2E Tests
  # ──────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Non-blocking: E2E requires a running web server; wired up in T-E2E-001
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build browser app
        run: pnpm build:browser

      - name: Install Playwright browsers
        run: pnpm --filter=@opencad/e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter=@opencad/e2e test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ──────────────────────────────────────────────────────────────
  # 7. Build Check
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust (wasm-pack / sync-rs)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/sync-rs -> pkg

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (excluding desktop)
        # Desktop build requires Tauri system deps; handled in desktop-smoke job
        run: pnpm exec turbo run build --filter='!@opencad/desktop'

  # ──────────────────────────────────────────────────────────────
  # 8. Dependency Audit
  # ──────────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JavaScript dependencies
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────
  # 9. Desktop Build Smoke Test
  # ──────────────────────────────────────────────────────────────
  desktop-smoke:
    name: Desktop Build (Smoke Test)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Install WASM toolchain (wasm-pack + wasm-bindgen-cli)
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          WASM_BINDGEN_VERSION="0.2.93"
          curl -sSL -o /tmp/wasm-bindgen.tar.gz "https://github.com/rustwasm/wasm-bindgen/releases/download/${WASM_BINDGEN_VERSION}/wasm-bindgen-${WASM_BINDGEN_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf /tmp/wasm-bindgen.tar.gz --strip-components=1 -C /tmp
          sudo mv /tmp/wasm-bindgen /usr/local/bin/wasm-bindgen

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            packages/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop app (debug)
        run: pnpm --filter @opencad/desktop tauri build --debug

      - name: Verify build output
        run: |
          echo "Checking for desktop build artifacts..."
          ls -la packages/desktop/src-tauri/target/debug/bundle/ || echo "No bundle directory (expected in CI without display)"
